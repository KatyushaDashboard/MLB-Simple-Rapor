name: Daily MLB Bot Updater

on:
  schedule:
    # Jalan otomatis setiap jam 06:00 UTC (Sama dengan 13:00 WIB siang)
    # Waktu yang pas karena pertandingan MLB biasanya udah selesai semua
    - cron: '0 6 * * *'
  
  # INI KUNCINYA, WAK! Biar muncul tombol "Run workflow" manual
  workflow_dispatch: 

permissions:
  contents: write # Penting banget biar bot lu diizinkan nge-save file JSON baru ke GitHub

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas MLB-StatsAPI
          # Tambahkan library lain di atas kalau ada yang kurang
          
      - name: Run Bot Updater
        run: python bot_updater.py
        
      - name: Commit and Push New JSON Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add yesterday_results.json today_schedule.json daily_picks_log.json
          git add *.json
          git commit -m "🤖 Auto-update: Tarik skor H-1 & Jadwal MLB hari ini" || echo "Tidak ada perubahan data"
          git push
